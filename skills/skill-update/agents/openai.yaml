interface:
  display_name: "Skill Update"
  short_description: "Maintain an existing shared skill end to end"
  default_prompt: "Use $skill-update to revise an existing shared skill; read docs/update-source-registry.md first, treat .gitmodules as the canonical source for vendored plugin/submodule update candidates, verify plugin catalog and Plugin update list drift with scripts/validate-plugins.ts, every invocation starts with original/upstream provenance preflight, use $web-research for any found or suspected source, record adopt/adapt/reject/defer decisions, and keep SKILL.md, references, validators, skill.html, snippets, docs, and history in sync. If skill.html changes, verify wide tables, SVG arrow endpoints, overflow, and text overlap in addition to the HTML validator. Do not update plugin packages, MCP config, or submodules incidentally; when the user explicitly includes plugin updates, use the plugin update lane."
