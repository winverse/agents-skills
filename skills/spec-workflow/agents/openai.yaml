interface:
  display_name: "Spec Workflow"
  short_description: "Workflow suite implementation half for spec loops"
  default_prompt: "Use $spec-workflow when an existing PRD, issue, spec, bug repro, acceptance criteria, ADR, design.md, or workflow-state.md cache should be turned into a verified implementation slice. Read the current spec authority and state cache first, label selected primitives with source package and exact skill/plugin name, and require TDD before production code edits in target code repos: RED evidence first, characterization evidence second, explicit TDD exception only when neither is practical. This shared skills repo documents the target-project hook contract only; do not install or run a TDD hook here. Use review, QA/runtime evidence, document sync, state update, and completion reporting. If a wrong route or missed gate appears, leave an agent-eval-harness seed candidate; if the request is still raw product discovery, project setup, structure choice, or design-system initialization, hand off to $project-workflow instead."
