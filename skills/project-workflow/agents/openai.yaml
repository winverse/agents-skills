interface:
  display_name: "Project Workflow"
  short_description: "Workflow suite setup half for project bootstrap"
  default_prompt: "Use $project-workflow for new projects, raw product ideas, major initiative setup, cross-agent project setup, domain/architecture/design/PRD/issue backlog preparation, workflow-state.md cache creation, parallel work-claims.md lane coordination, and handoff into $spec-workflow. Unless the user or target project explicitly sets another language, write initial setup artifacts and project docs in Korean first while preserving exact code identifiers, commands, paths, product names, API names, and upstream skill/plugin names. Label selected primitives with source package and exact skill/plugin name, such as Matt Pocock skills grill-me, GStack plugin office-hours, repo-local project-structure, and user custom design.md. When parallel sessions, agents, or worktrees may implement, split lanes by owner/session, branch or worktree, claimed write set, read-only paths, shared/hotspot files, integration owner, status, validation command, and evidence path. Do not run implementation TDD, writing-plans, subagent-driven-development, QA, or diagnose here; record the policy and hand off a ready vertical spec or issue to $spec-workflow."
