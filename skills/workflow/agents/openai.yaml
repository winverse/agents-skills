interface:
  display_name: "Workflow"
  short_description: "Front-loaded project and feature workflow"
  default_prompt: "Use $workflow to inventory Matt Pocock, GStack, Superpowers, design-direction, and repo-local helper dependencies, then choose the next project workflow step while preserving the source direct-use order. Call project-structure only after domain language and concrete architecture questions exist, before ADR/PRD lock. Use scenario lanes for raw SaaS/service ideas, existing API cleanup, substantial UI, CLI/no-browser work, Docker/AWS/Pulumi services, MCP/API/file-write automation, cross-agent setup, and completion/ship. In this repo, /goal means the Claude Code /goal feature; for long Claude Code runs, propose a /goal condition, otherwise write the same measurable end state, check evidence, constraints, and turn/time bound as a checklist. Use $agent-eval-harness as a separate validation handoff for workflow routing, dependency inventory, project-structure timing, PRD settings, mockup selection, CLI/no-browser evidence, MCP/API gate decisions, project setup verification, completion/ship mapping, document sync, and artifact hygiene. If an upstream source skill changes, update only the orchestration boundary and keep direction quality over speed."
