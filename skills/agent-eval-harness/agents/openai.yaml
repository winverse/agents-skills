interface:
  display_name: "Agent Eval Harness"
  short_description: "Set up agent behavior evals"
  default_prompt: "Use $agent-eval-harness to set up an initial repo-local evaluation harness for agent skill routing, cross-agent portability, workflow behavior, safety boundaries, artifact hygiene, output quality, regression capture, local runner commands, and optional CI gating. When called from $project-workflow or $spec-workflow, seed cases for workflow routing, dependency inventory, project-structure timing, PRD settings, mockup selection, CLI/no-browser evidence, MCP/API gate decisions, project setup verification, spec implementation loops, completion mapping, document sync, artifact hygiene, and goal condition quality. In this repo, /goal means the Claude Code /goal feature; test condition text for measurable end state, check evidence, constraints, and turn/time bound."
